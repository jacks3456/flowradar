name: Update FlowRadar site

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate site data
        env:
          KRX_COOKIE: ${{ secrets.KRX_COOKIE }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ -n "$KRX_COOKIE" ] || { [ -n "$KRX_ID" ] && [ -n "$KRX_PW" ]; }; then
            python krx_money_flow.py --site-dir site
          else
            echo "No KRX credentials configured; publishing committed site/data/latest.json."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
