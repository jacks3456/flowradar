<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlowRadar</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --ink: #17201c;
      --muted: #62706a;
      --line: #dfe6df;
      --foreign: #0f766e;
      --institution: #b45309;
      --retail: #2563eb;
      --soft: #eef4f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    header {
      padding: 28px clamp(16px, 4vw, 48px) 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcf9;
    }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .meta span,
    .range-control {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 6px 10px;
      border-radius: 6px;
    }
    .language-control {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 12px;
    }
    .range-control,
    .language-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .range-control select,
    .language-control select {
      min-height: 24px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-weight: 650;
      outline: 0;
    }
    .language-control select {
      min-height: 20px;
      min-width: 74px;
      font-size: 12px;
    }
    main {
      width: min(1220px, calc(100% - 32px));
      margin: 24px auto 42px;
      display: grid;
      gap: 22px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcf9;
    }
    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .hint { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 18px;
    }
    .kpi {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--soft);
    }
    .kpi .label { color: var(--muted); font-size: 13px; }
    .kpi .value { margin-top: 8px; font-size: clamp(24px, 3vw, 34px); font-weight: 750; }
    .kpi .state { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .chart-wrap {
      padding: 18px;
      position: relative;
    }
    .chart-tooltip {
      position: absolute;
      z-index: 3;
      min-width: 168px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 10px 24px rgba(23, 32, 28, 0.12);
      color: var(--ink);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.55;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 12px));
    }
    .chart-tooltip[hidden] { display: none; }
    .chart-tooltip .date {
      margin-bottom: 4px;
      font-weight: 700;
      color: var(--ink);
    }
    .chart-tooltip .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .chart-tooltip .name {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }
    .chart-tooltip .swatch {
      width: 14px;
      height: 3px;
      border-radius: 99px;
      background: var(--ink);
    }
    canvas {
      display: block;
      width: 100%;
      height: 420px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 18px 0;
    }
    button {
      min-height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 7px 11px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }
    button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .table-wrap {
      overflow: auto;
      padding: 18px;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 740px;
      font-size: 13px;
    }
    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }
    th {
      background: #fbfcf9;
      color: #35433e;
      font-weight: 700;
      position: sticky;
      top: 0;
    }
    .positive { color: #047857; }
    .negative { color: #b91c1c; }
    .status {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .header-top { align-items: center; }
      .kpis { grid-template-columns: 1fr; }
      canvas { height: 330px; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .hint { white-space: normal; }
      .tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
      }
      button { flex: 0 0 auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1 id="title">FlowRadar</h1>
      <div id="languageHost"></div>
    </div>
    <div class="meta" id="meta"></div>
  </header>
  <main>
    <section>
      <div class="section-head">
        <h2 id="kpiTitle">市场资金方向</h2>
        <div class="hint" id="kpiHint">单位：亿韩元，正数为净买入</div>
      </div>
      <div class="kpis" id="kpis"><div class="status" id="kpiStatus">加载中</div></div>
    </section>

    <section>
      <div class="section-head">
        <h2 id="chartTitle">累计资金流</h2>
        <div class="hint" id="chartHint">外资、机构、散户累计净买卖金额</div>
      </div>
      <div class="chart-wrap">
        <canvas id="flowChart"></canvas>
        <div class="chart-tooltip" id="chartTooltip" hidden></div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2 id="detailTitle">最近明细</h2>
        <div class="hint" id="tableHint">市场与个股数据按日期倒序</div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="table-wrap" id="tableWrap"><div class="status" id="tableStatus">加载中</div></div>
    </section>
  </main>

        metrics: {"外资净买卖金额": "外国人 売買代金", "机构净买卖金额": "機関 売買代金", "散户净买卖金额": "個人 売買代金"},

    const periodOptions = [
      {value: "365d", label: "365d", days: 365},
      {value: "90d", label: "90d", days: 90},
      {value: "30d", label: "30d", days: 30},
      {value: "7d", label: "7d", days: 7}
    ];
    let data = null;
    let selectedPeriod = "90d";
    let currentLanguage = localStorage.getItem("flowradar-language") || "zh-CN";
    let activeTabIndex = 0;
    let chartHoverIndex = null;

    function text(key) {
      return (i18n[currentLanguage] || i18n["zh-CN"])[key];
    }

    function locale() {
      return text("locale") || "zh-CN";
    }

    function setDocumentLanguage() {
      document.documentElement.lang = text("htmlLang") || currentLanguage;
    }

    function investorLabel(name) {
      return text("investors")?.[name] || name;
    }

    function columnLabel(column) {
      return text("columns")?.[column] || column;
    }

    function metricLabel(metric) {
      return text("metrics")?.[metric] || metric;
    }

    function stockLabel(label) {
      return text("stocks")?.[label] || label;
    }

    function marketLabel(market) {
      return `${market} ${text("marketSuffix")}`;
    }

    function statusLabel(status) {
      const match = String(status || "").match(/^连续(净买入|净卖出)\s+(\d+)\s+天$/);
      if (!match) return status || "";
      const action = match[1] === "净买入" ? text("netBuy") : text("netSell");
      const count = match[2];
      if (currentLanguage === "en") return `${action} for ${count} ${text("days")}`;
      if (currentLanguage === "ko") return `${text("consecutive")} ${action} ${count}${text("days")}`;
      if (currentLanguage === "ja") return `${text("consecutive")}${action} ${count}${text("days")}`;
      if (currentLanguage === "zh-Hant") return `${text("consecutive")}${action} ${count}${text("days")}`;
      return `${text("consecutive")}${action} ${count} ${text("days")}`;
    }

    function formatNumber(value, digits = 0) {
      return Number(value || 0).toLocaleString(locale(), {
        maximumFractionDigits: digits,
        minimumFractionDigits: digits
      });
    }

    function formatDate(value) {
      const text = String(value || "");
      const compact = text.match(/^(\d{4})(\d{2})(\d{2})$/);
      if (compact) return `${compact[1]}-${compact[2]}-${compact[3]}`;
      return text || "-";
    }

    function parseDate(value) {
      const normalized = formatDate(value);
      const date = new Date(`${normalized}T00:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function periodStartDate(endDate) {
      const option = periodOptions.find(item => item.value === selectedPeriod) || periodOptions[1];
      const start = new Date(endDate);
      if (option.days) start.setDate(start.getDate() - option.days + 1);
      return start;
    }

    function getDateRange() {
      const datedRows = (data?.marketFlow || []).filter(row => parseDate(row["日期"]));
      const latest = parseDate(data?.meta?.latestDate) || parseDate(datedRows[datedRows.length - 1]?.["日期"]);
      if (!latest) return {start: null, end: null};
      return {start: periodStartDate(latest), end: latest};
    }

    function filterRowsByPeriod(rows) {
      const {start, end} = getDateRange();
      if (!start || !end) return rows || [];
      return (rows || []).filter(row => {
        const rowDate = parseDate(row["日期"]);
        return rowDate && rowDate >= start && rowDate <= end;
      });
    }

    function filteredMarketFlow() {
      const totals = {"外资": 0, "机构": 0, "散户": 0};
      return filterRowsByPeriod(data?.marketFlow || []).map(row => {
        const next = {...row};
        investors.forEach(name => {
          totals[name] += Number(row[name] || 0);
          next[`${name}累计`] = totals[name];
        });
        return next;
      });
    }

    function activeRangeLabel() {
      const rows = filteredMarketFlow();
      if (!rows.length) return text("emptyRange");
      return `${formatDate(rows[0]["日期"])} - ${formatDate(rows[rows.length - 1]["日期"])}`;
    }

    function className(value) {
      const number = Number(value || 0);
      if (number > 0) return "positive";
      if (number < 0) return "negative";
      return "";
    }

    function renderMeta() {
      setDocumentLanguage();
      const meta = data.meta || {};
      const market = meta.market || "KRX";
      document.title = `FlowRadar - ${market} ${text("titleSuffix")}`;
      document.getElementById("title").textContent = `FlowRadar`;
      document.getElementById("meta").innerHTML = `
        <span>${marketLabel(market)}</span>
        <label class="range-control" for="periodSelect">
          ${text("range")}
          <select id="periodSelect" aria-label="${text("rangeAria")}">
            ${periodOptions.map(option => `<option value="${option.value}" ${option.value === selectedPeriod ? "selected" : ""}>${option.label}</option>`).join("")}
          </select>
        </label>
        <span>${text("latestTradingDay")} ${formatDate(meta.latestDate)}</span>
      `;
      document.getElementById("periodSelect").addEventListener("change", event => {
        selectedPeriod = event.target.value;
        activeTabIndex = 0;
        renderPeriodViews();
      });
    }

    function renderLanguageControl() {
      document.getElementById("languageHost").innerHTML = `
        <label class="language-control" for="languageSelect">
          <select id="languageSelect" aria-label="${text("language")}">
            ${languageOptions.map(option => `<option value="${option.value}" ${option.value === currentLanguage ? "selected" : ""}>${option.label}</option>`).join("")}
          </select>
        </label>
      `;
      document.getElementById("languageSelect").addEventListener("change", event => {
        currentLanguage = event.target.value;
        localStorage.setItem("flowradar-language", currentLanguage);
        if (data) renderAll();
        else renderStaticText();
      });
    }

    function renderKpis() {
      const host = document.getElementById("kpis");
      const marketName = `${data.meta?.market || "KOSPI"}市场`;
      const rows = (data.summary || []).filter(row => row["对象"] === marketName || row["对象"] === "KOSPI市场");
      if (!rows.length) {
        host.innerHTML = `<div class="empty">${text("emptyMarket")}</div>`;
        return;
      }
      host.innerHTML = rows.map(row => `
        <div class="kpi">
          <div class="label">${metricLabel(row["指标"])}</div>
          <div class="value ${className(row["最近值"])}">${formatNumber(row["最近值"], 2)}</div>
          <div class="state">${statusLabel(row["连续状态"])}</div>
        </div>
      `).join("");
    }

    function drawChart() {
      const canvas = document.getElementById("flowChart");
      const ctx = canvas.getContext("2d");
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      const width = rect.width;
      const height = rect.height;
      const points = filteredMarketFlow();
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      if (!points.length) {
        canvas._chartState = null;
        return;
      }

      const values = points.flatMap(row => investors.map(name => Number(row[`${name}累计`] || 0)));
      let min = Math.min(...values, 0);
      let max = Math.max(...values, 0);
      if (min === max) { min -= 1; max += 1; }
      ctx.font = "12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      const yLabels = Array.from({length: 5}, (_, index) => formatNumber(max - index / 4 * (max - min), 0));
      const leftPad = Math.max(58, Math.ceil(Math.max(...yLabels.map(label => ctx.measureText(label).width))) + 14);
      const pad = {left: Math.min(leftPad, Math.max(58, width * 0.32)), right: 18, top: 24, bottom: 74};
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const x = index => pad.left + (points.length === 1 ? plotW / 2 : (index / (points.length - 1)) * plotW);
      const y = value => pad.top + (max - value) / (max - min) * plotH;
      const xTickCount = Math.min(4, points.length);
      const xTickIndexes = Array.from({length: xTickCount}, (_, tick) => {
        if (xTickCount === 1) return 0;
        return Math.round(tick * (points.length - 1) / (xTickCount - 1));
      }).filter((index, position, list) => list.indexOf(index) === position);

      ctx.strokeStyle = "#dfe6df";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= 4; i++) {
        const gy = pad.top + i / 4 * plotH;
        ctx.moveTo(pad.left, gy);
        ctx.lineTo(width - pad.right, gy);
      }
      ctx.stroke();

      ctx.strokeStyle = "#edf2ed";
      ctx.beginPath();
      xTickIndexes.forEach(index => {
        const tx = x(index);
        ctx.moveTo(tx, pad.top);
        ctx.lineTo(tx, pad.top + plotH);
      });
      ctx.stroke();

      ctx.fillStyle = "#62706a";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i++) {
        ctx.fillText(yLabels[i], pad.left - 8, pad.top + i / 4 * plotH);
      }

      const zeroY = y(0);
      ctx.strokeStyle = "#94a39d";
      ctx.beginPath();
      ctx.moveTo(pad.left, zeroY);
      ctx.lineTo(width - pad.right, zeroY);
      ctx.stroke();

      investors.forEach(name => {
        ctx.strokeStyle = colors[name];
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        points.forEach((row, index) => {
          const px = x(index);
          const py = y(Number(row[`${name}累计`] || 0));
          if (index === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
      });

      if (chartHoverIndex !== null && points[chartHoverIndex]) {
        const hoverX = x(chartHoverIndex);
        ctx.strokeStyle = "#7b8a84";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(hoverX, pad.top);
        ctx.lineTo(hoverX, pad.top + plotH);
        ctx.stroke();
        ctx.setLineDash([]);

        investors.forEach(name => {
          const hoverY = y(Number(points[chartHoverIndex][`${name}累计`] || 0));
          ctx.fillStyle = "#ffffff";
          ctx.strokeStyle = colors[name];
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(hoverX, hoverY, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        });
      }

      const axisY = pad.top + plotH;
      const dateY = height - 44;
      ctx.strokeStyle = "#b7c2bd";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.left, axisY);
      ctx.lineTo(width - pad.right, axisY);
      xTickIndexes.forEach(index => {
        const tx = x(index);
        ctx.moveTo(tx, axisY);
        ctx.lineTo(tx, axisY + 5);
      });
      ctx.stroke();

      ctx.fillStyle = "#62706a";
      ctx.textBaseline = "alphabetic";
      xTickIndexes.forEach((pointIndex, tickIndex) => {
        const tx = x(pointIndex);
        if (tickIndex === 0) ctx.textAlign = "left";
        else if (tickIndex === xTickIndexes.length - 1) ctx.textAlign = "right";
        else ctx.textAlign = "center";
        ctx.fillText(points[pointIndex]["日期"], tx, dateY);
      });

      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      investors.forEach((name, index) => {
        const lx = pad.left + index * 92;
        const ly = height - 14;
        ctx.fillStyle = colors[name];
        ctx.fillRect(lx, ly - 10, 18, 3);
        ctx.fillStyle = "#35433e";
        ctx.fillText(investorLabel(name), lx + 25, ly - 5);
      });

      canvas._chartState = {points, pad, plotW, plotH};
    }

    function showChartTooltip(index, mouseX, mouseY) {
      const tooltip = document.getElementById("chartTooltip");
      const canvas = document.getElementById("flowChart");
      const state = canvas._chartState;
      const point = state?.points?.[index];
      if (!point) {
        hideChartTooltip();
        return;
      }

      tooltip.innerHTML = `
        <div class="date">${point["日期"]}</div>
        ${investors.map(name => `
          <div class="row">
            <span class="name"><span class="swatch" style="background:${colors[name]}"></span>${investorLabel(name)}</span>
            <strong class="${className(point[`${name}累计`])}">${formatNumber(point[`${name}累计`], 2)}</strong>
          </div>
        `).join("")}
      `;
      tooltip.hidden = false;

      const wrap = canvas.parentElement;
      const tooltipWidth = tooltip.offsetWidth;
      const tooltipHeight = tooltip.offsetHeight;
      const x = Math.min(Math.max(mouseX, tooltipWidth / 2 + 8), wrap.clientWidth - tooltipWidth / 2 - 8);
      const y = Math.max(mouseY, tooltipHeight + 18);
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideChartTooltip() {
      const tooltip = document.getElementById("chartTooltip");
      chartHoverIndex = null;
      if (tooltip) tooltip.hidden = true;
      if (data) drawChart();
    }

    function bindChartTooltip() {
      const canvas = document.getElementById("flowChart");
      canvas.addEventListener("mousemove", event => {
        const state = canvas._chartState;
        if (!state?.points?.length) return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;
        const {points, pad, plotW, plotH} = state;
        if (
          mouseX < pad.left ||
          mouseX > pad.left + plotW ||
          mouseY < pad.top ||
          mouseY > pad.top + plotH
        ) {
          hideChartTooltip();
          return;
        }
        const index = Math.round((mouseX - pad.left) / plotW * (points.length - 1));
        const boundedIndex = Math.min(Math.max(index, 0), points.length - 1);
        if (boundedIndex !== chartHoverIndex) {
          chartHoverIndex = boundedIndex;
          drawChart();
        }
        showChartTooltip(boundedIndex, mouseX, mouseY);
      });
      canvas.addEventListener("mouseleave", hideChartTooltip);
    }

    function tableFor(tab) {
      const label = tab?.label || "";
      const rows = tab?.rows || [];
      const isMarket = Boolean(tab?.isMarket);
      const recent = [...(rows || [])].reverse().slice(0, 30);
      const columns = Object.keys(recent[0] || {}).filter(column => (
        column !== "其他法人" && !column.endsWith("累计")
      ));
      if (!columns.length) {
        document.getElementById("tableWrap").innerHTML = `<div class="empty">${text("emptyDetails")}</div>`;
        return;
      }
      document.getElementById("tableWrap").innerHTML = `
        <table>
          <thead><tr>${columns.map(col => `<th>${columnLabel(col)}</th>`).join("")}</tr></thead>
          <tbody>
            ${recent.map(row => `<tr>${columns.map(col => {
              const value = row[col];
              const numeric = typeof value === "number";
              const tableValue = numeric && !isMarket ? value / 100000000 : value;
              return `<td class="${numeric ? className(tableValue) : ""}">${numeric ? formatNumber(tableValue, 2) : value}</td>`;
            }).join("")}</tr>`).join("")}
          </tbody>
        </table>
      `;
    }

    function renderTabs() {
      const tabs = [
        {label: text("marketFunds"), rows: data.marketFlow, isMarket: true},
        ...Object.entries(data.stockFlows || {}).flatMap(([ticker, frames]) => {
          const stockTabs = [];
          if (frames.value?.length) stockTabs.push({label: stockLabel(ticker), rows: frames.value, isMarket: false});
          return stockTabs;
        })
      ].filter(tab => tab.rows?.length);
      const host = document.getElementById("tabs");
      if (!tabs.length) {
        host.innerHTML = "";
        tableFor(null);
        return;
      }
      if (activeTabIndex >= tabs.length) activeTabIndex = 0;
      host.innerHTML = tabs.map((tab, index) => `<button type="button" data-index="${index}" class="${index === activeTabIndex ? "active" : ""}">${tab.label}</button>`).join("");
      host.onclick = event => {
        const button = event.target.closest("button");
        if (!button) return;
        host.querySelectorAll("button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        activeTabIndex = Number(button.dataset.index);
        const tab = tabs[activeTabIndex];
        tableFor(tab);
      };
      tableFor(tabs[activeTabIndex]);
    }

    function renderStaticText() {
      setDocumentLanguage();
      renderLanguageControl();
      document.getElementById("kpiTitle").textContent = text("marketFlow");
      document.getElementById("kpiHint").textContent = text("kpiHint");
      document.getElementById("chartTitle").textContent = text("cumulativeFlow");
      document.getElementById("detailTitle").textContent = text("recentDetails");
      const kpiStatus = document.getElementById("kpiStatus");
      const tableStatus = document.getElementById("tableStatus");
      if (kpiStatus) kpiStatus.textContent = text("loading");
      if (tableStatus) tableStatus.textContent = text("loading");
    }

    function renderPeriodViews() {
      chartHoverIndex = null;
      const tooltip = document.getElementById("chartTooltip");
      if (tooltip) tooltip.hidden = true;
      const rangeLabel = activeRangeLabel();
      document.getElementById("chartHint").textContent = `${text("chartHintBase")}: ${rangeLabel}`;
      document.getElementById("tableHint").textContent = text("tableHint");
      drawChart();
      renderTabs();
    }

    function renderAll() {
      renderStaticText();
      renderMeta();
      renderKpis();
      renderPeriodViews();
    }

    async function boot() {
      renderStaticText();
      try {
        const response = await fetch("data/latest.json", {cache: "no-store"});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        data = await response.json();
        renderAll();
        bindChartTooltip();
      } catch (error) {
        document.getElementById("kpis").innerHTML = `<div class="status">${text("dataUnavailable")}</div>`;
        document.getElementById("tableWrap").innerHTML = `<div class="status">${text("dataUnavailable")}</div>`;
      }
    }

    window.addEventListener("resize", () => {
      if (data) drawChart();
    });
    boot();
  </script>
</body>
</html>
